<!doctype html>
<html lang="tr">
  <head>
    <link rel="icon" type="image/png" href="favicon.png" sizes="96x96" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pastela – AI Fabric Design Studio</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- LEFT PANEL -->
    <div id="panel">
      <div class="brand">
        <h1>Pastela</h1>
        <p>AI Fabric Design Studio</p>
      </div>

      <!-- Prompt -->
      <div>
        <div class="section-label">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            style="color: #e8896a"
          >
            <path
              d="M12 2L13.5 8.5L20 10L13.5 11.5L12 18L10.5 11.5L4 10L10.5 8.5Z"
            />
            <path
              d="M19 19L19.5 21L21 21.5L19.5 22L19 24L18.5 22L17 21.5L18.5 21Z"
              opacity="0.5"
            />
          </svg>
          AI Design Prompt
        </div>
        <div id="prompt-box">
          <textarea
            id="prompt"
            placeholder="Describe your fabric pattern... e.g., 'Elegant floral motifs with roses and leaves in a vintage style'"
          ></textarea>
        </div>
      </div>

      <button id="generate-btn" onclick="generatePattern()">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
        >
          <path
            d="M12 2L13.5 8.5L20 10L13.5 11.5L12 18L10.5 11.5L4 10L10.5 8.5Z"
          />
        </svg>
        Generate Pattern
      </button>

      <div class="divider"></div>

      <!-- Background Pattern -->
      <div>
        <div class="section-label">Background Pattern</div>
        <div class="pattern-btns">
          <button
            class="pattern-btn active"
            data-type="solid"
            onclick="selectPattern('solid', this)"
            title="Solid"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="3" y="3" width="18" height="18" rx="3" />
            </svg>
          </button>
          <button
            class="pattern-btn"
            data-type="circle"
            onclick="selectPattern('circle', this)"
            title="Circle"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="9" />
            </svg>
          </button>
          <button
            class="pattern-btn"
            data-type="stripe"
            onclick="selectPattern('stripe', this)"
            title="Stripe"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="8" y1="3" x2="8" y2="21" />
              <line x1="12" y1="3" x2="12" y2="21" />
              <line x1="16" y1="3" x2="16" y2="21" />
            </svg>
          </button>
          <button
            class="pattern-btn"
            data-type="layered"
            onclick="selectPattern('layered', this)"
            title="Layered"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polygon points="12,2 22,8.5 12,15 2,8.5" />
              <polyline points="2,12 12,18.5 22,12" />
              <polyline points="2,15.5 12,22 22,15.5" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Background Color -->
      <div>
        <div class="section-label">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c1.1 0 2-.9 2-2 0-.53-.21-1.01-.54-1.36-.32-.34-.51-.81-.51-1.29 0-1.1.9-2 2-2h2.34c2.58 0 4.71-2.13 4.71-4.71C22 6.22 17.52 2 12 2z"
              fill="none"
              stroke="#6DB38A"
            />
            <circle cx="6.5" cy="11.5" r="1.5" fill="#E87C6A" stroke="none" />
            <circle cx="9.5" cy="7.5" r="1.5" fill="#6DB38A" stroke="none" />
            <circle cx="14.5" cy="7.5" r="1.5" fill="#E8C46A" stroke="none" />
            <circle cx="17.5" cy="11.5" r="1.5" fill="#6B9EC9" stroke="none" />
          </svg>
          Background Color
        </div>
        <div class="color-grid" id="bg-color-grid"></div>
        <div class="custom-color-row">
          <label>Custom:</label>
          <input
            type="color"
            id="bg-custom-color"
            value="#F5DDD8"
            onchange="setBgColor(this.value)"
          />
          <span id="bg-custom-hex">#F5DDD8</span>
        </div>
      </div>

      <!-- Pattern Color — sadece Circle & Stripe -->
      <div id="pattern-color-section">
        <div class="section-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
          </svg>
          Pattern Color
        </div>
        <div class="color-grid" id="pat-color-grid"></div>
        <div class="custom-color-row">
          <label>Custom:</label>
          <input
            type="color"
            id="pat-custom-color"
            value="#FFFFFF"
            onchange="setPatColor(this.value)"
          />
          <span id="pat-custom-hex">#FFFFFF</span>
        </div>
      </div>

      <!-- Pattern Scale — sadece Circle & Stripe -->
      <div id="pattern-scale-section" class="slider-section">
        <div class="section-label">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="#A8C5D8"
            stroke-width="2"
          >
            <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" />
          </svg>
          Pattern Scale
        </div>
        <input
          type="range"
          id="pattern-scale"
          min="50"
          max="300"
          value="90"
          oninput="updateSlider(this, 'pattern-scale-val')"
        />
        <div class="slider-value"><span id="pattern-scale-val">90</span>%</div>
      </div>

      <!-- Design Scale — desen üretildikten sonra görünür -->
      <div id="design-scale-section" class="slider-section ctrl-hidden">
        <div class="section-label">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="#E88A6A"
            stroke-width="2"
          >
            <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" />
          </svg>
          Design Scale
        </div>
        <input
          type="range"
          id="design-scale"
          min="10"
          max="200"
          value="100"
          oninput="updateSlider(this, 'design-scale-val')"
        />
        <div class="slider-value"><span id="design-scale-val">100</span>%</div>
      </div>

      <!-- Canvas Zoom -->
      <div class="slider-section">
        <div class="section-label">Canvas Zoom</div>
        <div class="zoom-row">
          <button class="zoom-btn" onclick="adjustZoom(-10)">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
              <line x1="8" y1="11" x2="14" y2="11" />
            </svg>
          </button>
          <input
            type="range"
            id="canvas-zoom"
            min="25"
            max="200"
            value="75"
            oninput="updateZoom(this.value)"
          />
          <button class="zoom-btn" onclick="adjustZoom(10)">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
              <line x1="8" y1="11" x2="14" y2="11" />
              <line x1="11" y1="8" x2="11" y2="14" />
            </svg>
          </button>
        </div>
        <div class="slider-value"><span id="zoom-val">75</span>%</div>
      </div>

      <!-- Sol alt bilgi -->
      <div class="canvas-info">
        <div class="divider" style="margin-bottom: 12px"></div>
        <p>Canvas: 110cm × 90cm</p>
        <p>Print-ready resolution</p>
      </div>
    </div>

    <!-- CANVAS AREA -->
    <div id="canvas-area">
      <div id="canvas-wrapper">
        <canvas id="fabric-canvas" width="700" height="700"></canvas>
        <div id="loading-overlay">
          <div class="spinner"></div>
          <div class="loading-text">Desen üretiliyor...</div>
        </div>
      </div>

      <!-- İndir butonu -->
      <button id="download-btn" onclick="downloadCanvas()">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
        Download Design
      </button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
